    allowed_domains: [tao.sustech.edu.cn, mirrors.sustech.edu.cn]
    excluded_patterns: [/search, /tag, /print, /faculty, /news/old]
    category: undergraduate_teaching
    authority_level: 100
    crawl_depth: 3
    max_pages: 80
    enabled: true

