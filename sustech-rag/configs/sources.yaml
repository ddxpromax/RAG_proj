defaults:
  user_agent: "SUSTech-RAG-Course-Project/0.1 (+educational use)"
  per_domain_concurrency: 2
  request_delay_seconds: [0.5, 1.5]
  timeout_seconds: 30
  retries: 2
  max_html_bytes: 5242880
  max_pdf_bytes: 52428800
  respect_robots_txt: true

sources:
  - source_id: sustech_main
    name: 南方科技大学主站
    base_url: https://www.sustech.edu.cn/
    seed_urls:
      - https://www.sustech.edu.cn/
      - https://www.sustech.edu.cn/zh/college.html
    allowed_domains: [www.sustech.edu.cn]
    excluded_patterns: [/news, /events, /faculty, /search, /tag]
    category: university_overview
    authority_level: 90
    crawl_depth: 2
    max_pages: 40
    enabled: true

  - source_id: admissions_undergrad
    name: 本科招生
    base_url: https://zs.sustech.edu.cn/
    seed_urls: [https://zs.sustech.edu.cn/]
    allowed_domains: [zs.sustech.edu.cn]
    excluded_patterns: [/news/old, /search, /tag]
    category: admissions
    authority_level: 95
    crawl_depth: 3
    max_pages: 45
    enabled: true

  - source_id: tao_undergrad
    name: 本科教学相关公开信息
    base_url: https://tao.sustech.edu.cn/
